<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>kaigo-forms-collector 進捗</title>
<style>
  body { font-family: -apple-system, "Hiragino Sans", sans-serif; margin: 20px; background:#fafafa; color:#222; }
  h1 { font-size: 20px; margin: 0 0 8px; }
  .summary { display:flex; gap:12px; margin:12px 0; flex-wrap:wrap; }
  .card { background:#fff; border:1px solid #e5e5e5; border-radius:8px; padding:10px 14px; min-width:120px; }
  .card .v { font-size:22px; font-weight:600; }
  .card .l { font-size:11px; color:#666; }
  table { border-collapse: collapse; width:100%; background:#fff; font-size:12px; }
  th, td { border:1px solid #eee; padding:4px 8px; text-align:left; }
  th { background:#f3f3f3; position: sticky; top:0; }
  tr.running { background:#fffbea; }
  tr.error { background:#ffecec; }
  tr.done { background:#f3fff3; }
  input { padding:4px 8px; font-size:12px; }
  .bar { height:6px; background:#eee; border-radius:3px; overflow:hidden; }
  .bar > div { height:100%; background:#4a90e2; }
</style>
</head>
<body>
<h1>kaigo-forms-collector 進捗ダッシュボード</h1>
<div class="summary" id="summary"></div>
<input id="filter" placeholder="フィルタ (id/名前)" oninput="render()">
<div style="height:8px"></div>
<table>
  <thead><tr>
    <th>#</th><th>target_id</th><th>state</th><th>pages</th><th>files</th>
    <th>errors</th><th>skipped</th><th>最終更新</th>
  </tr></thead>
  <tbody id="tbody"></tbody>
</table>
<script>
let DATA = {targets:{}, updated_at:0};
async function refresh() {
  try {
    const r = await fetch("../logs_new/progress.json?t=" + Date.now());
    DATA = await r.json();
    render();
  } catch(e) {
    document.getElementById("summary").innerHTML =
      '<div class="card"><div class="v">--</div><div class="l">progress.json未生成</div></div>';
  }
}
function render() {
  const t = DATA.targets || {};
  const entries = Object.entries(t);
  const q = (document.getElementById("filter").value || "").toLowerCase();
  let total=0, done=0, running=0, err=0, files=0, pages=0;
  entries.forEach(([id, v]) => {
    total++;
    if (v.state === "done") done++;
    else if (v.state === "running") running++;
    else if (v.state === "error") err++;
    files += (v.stats?.files_downloaded) || 0;
    pages += (v.stats?.pages_visited) || 0;
  });
  const pct = total ? Math.round(done*100/total) : 0;
  document.getElementById("summary").innerHTML = `
    <div class="card"><div class="v">${done}/${total}</div><div class="l">完了</div></div>
    <div class="card"><div class="v">${running}</div><div class="l">実行中</div></div>
    <div class="card"><div class="v">${err}</div><div class="l">エラー</div></div>
    <div class="card"><div class="v">${files}</div><div class="l">DL合計</div></div>
    <div class="card"><div class="v">${pages}</div><div class="l">閲覧ページ</div></div>
    <div class="card" style="flex:1"><div class="l">${pct}% 完了</div>
      <div class="bar"><div style="width:${pct}%"></div></div></div>
  `;
  const filt = entries.filter(([id]) => !q || id.toLowerCase().includes(q));
  filt.sort((a,b) => (b[1].ts||0) - (a[1].ts||0));
  document.getElementById("tbody").innerHTML = filt.map(([id,v],i) => {
    const s = v.stats || {};
    const ts = v.ts ? new Date(v.ts*1000).toLocaleTimeString() : "";
    return `<tr class="${v.state}">
      <td>${i+1}</td><td>${id}</td><td>${v.state}</td>
      <td>${s.pages_visited||0}</td><td>${s.files_downloaded||0}</td>
      <td>${s.errors||0}</td><td>${s.skipped||0}</td><td>${ts}</td>
    </tr>`;
  }).join("");
}
refresh();
setInterval(refresh, 3000);
</script>
</body>
</html>
